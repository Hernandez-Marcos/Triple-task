{% extends 'main.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'games/styles/ranking.css' %}">
{% endblock extra_css %}

{% block content %}

<div class="ranking-wrapper">
    <h2>Ranking</h2>
    <ol class="ranking">
        {% for position in ranking %}
            <li>{{position.user}} - {{position.score}}</li>
        {% endfor %}
    </ol>    
</div>


{% endblock content %}
